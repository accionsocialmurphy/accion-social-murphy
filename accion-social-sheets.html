<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Acción Social">
<meta name="theme-color" content="#2563EB">
<title>Acción Social — Murphy, Santa Fe</title>
<link rel="manifest" href="#" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Nunito',sans-serif;background:#F4F6FA;color:#111827;height:100%;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
input,select,textarea,button{font-family:'Nunito',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#E4E8F0;border-radius:4px}
textarea{resize:vertical}
.tap:active{opacity:.7}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#F4F6FA}
/* Cards */
.scard{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #E4E8F0}
/* Bottom sheet */
.sheet-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.sheet-bg{background:rgba(0,0,0,.45);position:absolute;inset:0}
.sheet-box{position:relative;background:#fff;border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.18)}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #E4E8F0}
.sheet-body{overflow-y:auto;padding:16px 20px 36px;flex:1}
/* Detail panel */
.detail-panel{position:fixed;inset:0;z-index:150;background:#F4F6FA;display:flex;flex-direction:column}
.detail-header{padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.detail-body{padding:16px;flex:1;overflow-y:auto}
/* Form fields */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:700;color:#6B7280}
.field input,.field select,.field textarea{background:#F9FAFB;border:1.5px solid #E4E8F0;border-radius:10px;color:#111827;padding:10px 12px;font-size:14px;width:100%;font-family:'Nunito',sans-serif}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#2563EB}
/* Buttons */
.btn{border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;font-family:'Nunito',sans-serif}
.btn-primary{background:#2563EB;color:#fff}
.btn-ghost{background:transparent;color:#6B7280;border:1.5px solid #E4E8F0}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1.5px solid rgba(220,38,38,.27)}
.btn-green{background:#059669;color:#fff}
.btn-full{width:100%;justify-content:center}
/* Topbar */
.topbar{background:#fff;border-bottom:1px solid #E4E8F0;padding:10px 16px 8px;position:sticky;top:0;z-index:100;flex-shrink:0}
/* Bottom nav */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E4E8F0;display:flex;z-index:100}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 2px 12px;background:transparent;border:none;color:#9CA3AF;cursor:pointer;font-family:'Nunito',sans-serif;min-width:0}
.bottomnav button.active{color:#2563EB}
.bottomnav button span.icon{font-size:24px;line-height:1}
.bottomnav button span.label{font-size:9px;font-weight:500}
.bottomnav button.active span.label{font-weight:800}
.nav-dot{width:20px;height:3px;background:#2563EB;border-radius:3px;margin-top:1px}
/* Badges */
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap}
.cat-chip{color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
/* Pill filters */
.pill{border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:'Nunito',sans-serif}
.pill.active{background:#2563EB;color:#fff}
.pill.inactive{background:#F1F5F9;color:#6B7280}
/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
/* Divider */
.divider{height:1px;background:#E4E8F0;margin:10px 0}
/* Grid 2 cols */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Scroll horizontal */
.hscroll{overflow-x:auto;display:flex;gap:6px;padding-bottom:4px}
/* Content area */
.content{flex:1;overflow-y:auto}
/* Acta */
.acta-header{background:linear-gradient(135deg,#1e3a5f,#2563EB);border-radius:14px;padding:20px;color:#fff;margin-bottom:14px}
</style>
</head>
<body>
<div id="loading-overlay" style="position:fixed;bottom:16px;right:16px;z-index:999;background:#2563EB;color:#fff;border-radius:12px;padding:10px 16px;display:none;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-size:13px;font-weight:700;font-family:Nunito,sans-serif">
  <div style="width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></div>
  Sincronizando...
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div class="app" id="app">
  <!-- Rendered by JS -->
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATOS Y CONSTANTES
// ═══════════════════════════════════════════════════════
const CATS = ["Vivienda","Económica","Laboral","Familiar","Salud","Educación","Trámites","Consumo problemático","Equipo de Niñez","Consultorio de Escucha Niñez","Talleres Centro de Día","Derivación a Equipo de Género","Traslados","Salud Mental","Pago de Servicios","Otros"];
const SUBCATS = {"Salud":["Análisis","Ecografía","Medicación","Ayuda Excepcional"]};
const TIPOS_ATENCION = ["Presencial","Telefónica","Domiciliaria","Telemática"];
const PROFS = ["Biolatto Eliana","Compagnucci Natalia","Gateu Sofía","Quinteros Anabella","Rubio María Celeste"];
const TIPOS_REUNION = ["Reunión de equipo","Reunión interinstitucional","Capacitación","Supervisión","Otra"];
const TIPOS_EVENTO = [{label:"Reunión",color:"#2563EB",icon:"🤝"},{label:"Visita",color:"#059669",icon:"🏠"},{label:"Trámite",color:"#D97706",icon:"📄"},{label:"Capacitación",color:"#7C3AED",icon:"📚"},{label:"Recordatorio",color:"#DC2626",icon:"🔔"},{label:"Otro",color:"#6B7280",icon:"📌"}];
const CAT_COLORS = {"Vivienda":"#2563EB","Económica":"#059669","Laboral":"#D97706","Familiar":"#7C3AED","Salud":"#DC2626","Educación":"#0891B2","Trámites":"#475569","Consumo problemático":"#B45309","Equipo de Niñez":"#0D9488","Consultorio de Escucha Niñez":"#0E7490","Talleres Centro de Día":"#6D28D9","Derivación a Equipo de Género":"#DB2777","Traslados":"#0369A1","Salud Mental":"#7C3AED","Pago de Servicios":"#059669","Otros":"#6B7280"};
const CIUDAD = "Murphy, Santa Fe, CP 2601";
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_CORTO = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

// ═══════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
const STATE = {
  tab: "inicio",
  searchInt: "",
  usuarios: [],
  intervenciones: [],
  atenciones: [],
  reuniones: [],
  eventos: [],
  // UI state
  sheet: null,
  detail: null,
  form: {},
  // Usuarios
  searchNombre: "",
  searchDni: "",
  // Intervenciones
  filtCat: "",
  // Atenciones
  fechaAten: hoy(),
  // Calendario
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  calVista: "mes",
  calDia: null,
  // Mapa
  mapaCat: "",
  // Legajo
  legajoModo: "nombre",
  legajoQuery: "",
  legajoSel: null,
  // Institucional
  partNombre: "",
  sitNombre: "",
  sitDni: "",
  // More menu
  menuOpen: false,
  // Acta view
  actaReunion: null,
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function hoy(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ return d ? new Date(d+"T12:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"}) : "—"; }
function fmtDateL(d){ return d ? new Date(d+"T12:00").toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"}) : "—"; }
function initials(n){ return (n||"?").split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase(); }
function newId(arr){ return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; }
function tipoColor(t){ return (TIPOS_EVENTO.find(x=>x.label===t)||{color:"#6B7280"}).color; }
function tipoIcon(t){ return (TIPOS_EVENTO.find(x=>x.label===t)||{icon:"📌"}).icon; }
function catColor(c){ return CAT_COLORS[c]||"#6B7280"; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function setState(patch){
  Object.assign(STATE, patch);
  render();
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
function render(){
  const app = document.getElementById("app");
  app.innerHTML = buildApp();
  bindEvents();
}

// ═══════════════════════════════════════════════════════
// UI ATOMS
// ═══════════════════════════════════════════════════════
function Avatar(name, size=38, color="#2563EB"){
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${color}22;border:2px solid ${color}44;font-size:${size*.36}px;color:${color}">${esc(initials(name))}</div>`;
}
function Badge(label, bg, color){
  return `<span class="badge" style="background:${bg};color:${color}">${esc(label)}</span>`;
}
function CatChip(val){
  return `<span class="cat-chip" style="background:${catColor(val)}">${esc(val)}</span>`;
}
function SCard(inner, style="", onclick=""){
  return `<div class="scard${onclick?' tap':''}" style="${style}" ${onclick?`onclick="${onclick}"`:""}>${inner}</div>`;
}
function Field(label, id, type="text", value="", opts=null, required=false, placeholder="", rows=3){
  const lbl = label ? `<label for="${id}">${esc(label)}${required?'<span style="color:#DC2626"> *</span>':''}</label>` : "";
  let input = "";
  if(opts){
    input = `<select id="${id}" name="${id}"><option value="">Seleccionar…</option>${opts.map(o=>`<option value="${esc(o)}" ${value===o?"selected":""}>${esc(o)}</option>`).join("")}</select>`;
  } else if(type==="textarea"){
    input = `<textarea id="${id}" name="${id}" rows="${rows}" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`;
  } else {
    input = `<input type="${type}" id="${id}" name="${id}" value="${esc(String(value||""))}" placeholder="${esc(placeholder)}">`;
  }
  return `<div class="field">${lbl}${input}</div>`;
}
function Divider(){ return `<div class="divider"></div>`; }

// ═══════════════════════════════════════════════════════
// SHEET COMPONENT
// ═══════════════════════════════════════════════════════
function Sheet(title, body){
  return `<div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet-bg" onclick="closeSheet()"></div>
    <div class="sheet-box">
      <div class="sheet-header">
        <h3 style="font-size:16px;font-weight:800">${esc(title)}</h3>
        <button onclick="closeSheet()" style="background:#F4F6FA;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;color:#6B7280;display:flex;align-items:center;justify-content:center;cursor:pointer">×</button>
      </div>
      <div class="sheet-body">${body}</div>
    </div>
  </div>`;
}
function closeSheet(){ setState({sheet:null,form:{},partNombre:"",sitNombre:"",sitDni:""}); }

// ═══════════════════════════════════════════════════════
// TOPBAR
// ═══════════════════════════════════════════════════════
const LABEL = {inicio:"Inicio",usuarios:"Usuarios",intervenciones:"Intervenciones",atenciones:"Atenciones diarias",seguimiento:"Seguimiento",institucional:"Institucional",legajo:"Legajo",mapa:"Mapa territorial",calendario:"Calendario"};
function buildTopbar(){
  const d = new Date();
  const dayNum = d.toLocaleDateString("es-ES",{day:"numeric"});
  const dayName = d.toLocaleDateString("es-ES",{weekday:"long"});
  const monthYear = d.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
  return `<div class="topbar">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-size:26px;font-weight:800;line-height:1">${dayNum}</span>
        <div>
          <div style="font-size:13px;font-weight:700;text-transform:capitalize">${dayName}</div>
          <div style="font-size:11px;color:#6B7280;text-transform:capitalize">${monthYear}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:9px;font-weight:800;color:#2563EB;letter-spacing:1.5px;text-transform:uppercase">Acción Social</div>
        <div style="font-size:13px;font-weight:800">${LABEL[STATE.tab]||""}</div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════
function buildBottomNav(){
  if(STATE.tab==="inicio") return "";
  const main = [{id:"usuarios",label:"Usuarios",icon:"👥"},{id:"intervenciones",label:"Interv.",icon:"📋"},{id:"atenciones",label:"Atenciones",icon:"📅"}];
  const more = [{id:"seguimiento",label:"Seguimiento",icon:"🔍"},{id:"institucional",label:"Institucional",icon:"🏛"},{id:"mapa",label:"Mapa",icon:"🗺"},{id:"legajo",label:"Legajo",icon:"📂"},{id:"calendario",label:"Calendario",icon:"🗓"}];
  const inMore = more.some(t=>t.id===STATE.tab);
  let html = `<div class="bottomnav">
    <button onclick="goTo('inicio')" class="tap">
      <span class="icon">⊞</span><span class="label">Inicio</span>
    </button>`;
  main.forEach(t => {
    const active = STATE.tab===t.id;
    html += `<button onclick="goTo('${t.id}')" class="tap ${active?'active':''}">
      <span class="icon" style="font-size:${active?28:24}px">${t.icon}</span>
      <span class="label">${t.label}</span>
      ${active?'<div class="nav-dot"></div>':''}
    </button>`;
  });
  html += `<button onclick="toggleMenu()" class="tap ${inMore||STATE.menuOpen?'active':''}">
    <span class="icon" style="font-size:${STATE.menuOpen?28:24}px">⋯</span>
    <span class="label">Más</span>
    ${(inMore||STATE.menuOpen)?'<div class="nav-dot"></div>':''}
  </button></div>`;
  // More menu
  if(STATE.menuOpen){
    html += `<div style="position:fixed;inset:0;z-index:99" onclick="toggleMenu()">
      <div style="position:absolute;bottom:70px;right:8px;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.15);border:1px solid #E4E8F0;overflow:hidden;min-width:200px">
        ${more.map(t=>`<button onclick="goTo('${t.id}')" class="tap" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:${STATE.tab===t.id?'#EFF4FF':'transparent'};border:none;border-bottom:1px solid #E4E8F0;color:${STATE.tab===t.id?'#2563EB':'#111827'};font-weight:${STATE.tab===t.id?800:600};font-size:14px;text-align:left;cursor:pointer;font-family:Nunito,sans-serif">
          <span style="font-size:20px">${t.icon}</span>${t.label}
        </button>`).join("")}
      </div>
    </div>`;
  }
  return html;
}
function goTo(tab){ setState({tab,menuOpen:false,detail:null,sheet:null,actaReunion:null}); }
function toggleMenu(){ setState({menuOpen:!STATE.menuOpen}); }

// ═══════════════════════════════════════════════════════
// INICIO
// ═══════════════════════════════════════════════════════
function buildInicio(){
  const atenHoy = STATE.atenciones.filter(a=>a.fecha===hoy());
  const secciones = [
    {id:"usuarios",icon:"👥",label:"Usuarios",color:"#2563EB",val:STATE.usuarios.length,sub:"registrados"},
    {id:"intervenciones",icon:"📋",label:"Intervenciones",color:"#059669",val:STATE.intervenciones.length,sub:"totales"},
    {id:"atenciones",icon:"📅",label:"Atenciones",color:"#D97706",val:atenHoy.length,sub:"hoy"},
    {id:"legajo",icon:"📂",label:"Legajo",color:"#DC2626",val:null,sub:"buscar y descargar"},
    {id:"seguimiento",icon:"🔍",label:"Seguimiento",color:"#7C3AED",val:STATE.intervenciones.length,sub:"en curso"},
    {id:"institucional",icon:"🏛",label:"Institucional",color:"#0891B2",val:null,sub:"reuniones"},
    {id:"mapa",icon:"🗺",label:"Mapa",color:"#059669",val:null,sub:"territorial"},
    {id:"calendario",icon:"🗓",label:"Calendario",color:"#DC2626",val:null,sub:"del equipo"},
  ];
  const minHoy = atenHoy.reduce((s,a)=>s+(Number(a.duracion)||0),0);
  return `
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div style="flex:1;background:#EFF4FF;border-radius:14px;padding:12px 14px">
        <div style="font-size:22px;font-weight:800;color:#2563EB">${atenHoy.length}</div>
        <div style="font-size:11px;font-weight:600;color:#2563EB;opacity:.8">Atenciones hoy</div>
      </div>
      <div style="flex:1;background:#ECFDF5;border-radius:14px;padding:12px 14px">
        <div style="font-size:22px;font-weight:800;color:#059669">${minHoy} min</div>
        <div style="font-size:11px;font-weight:600;color:#059669;opacity:.8">Tiempo total</div>
      </div>
      <div style="flex:1;background:#F5F3FF;border-radius:14px;padding:12px 14px">
        <div style="font-size:22px;font-weight:800;color:#7C3AED">${STATE.usuarios.length}</div>
        <div style="font-size:11px;font-weight:600;color:#7C3AED;opacity:.8">Usuarios</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${secciones.map(s=>`
        <button onclick="goTo('${s.id}')" class="tap" style="background:#fff;border:1.5px solid #E4E8F0;border-radius:18px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06)">
          <div style="width:60px;height:60px;border-radius:16px;background:${s.color}18;display:flex;align-items:center;justify-content:center;font-size:30px">${s.icon}</div>
          <div style="font-weight:800;font-size:14px;color:#111827">${s.label}</div>
          <div style="background:${s.color}18;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:${s.color}">${s.val!==null?`${s.val} ${s.sub}`:s.sub}</div>
        </button>`).join("")}
    </div>`;
}

// ═══════════════════════════════════════════════════════
// USUARIOS
// ═══════════════════════════════════════════════════════
function buildUsuarios(){
  if(STATE.detail && STATE.tab==="usuarios") return buildUsuarioDetalle();
  const filtered = STATE.usuarios.filter(u=>{
    const mn = !STATE.searchNombre || u.nombre.toLowerCase().includes(STATE.searchNombre.toLowerCase());
    const md = !STATE.searchDni || (u.dni||"").includes(STATE.searchDni);
    return mn && md;
  });
  return `
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      <div style="display:flex;gap:8px;align-items:center">
        <div style="flex:1;position:relative">
          <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#9CA3AF">👤</span>
          <input value="${esc(STATE.searchNombre)}" oninput="setState({searchNombre:this.value})" placeholder="Buscar por nombre…"
            style="width:100%;background:#fff;border:1.5px solid ${STATE.searchNombre?'#2563EB':'#E4E8F0'};border-radius:10px;padding:9px 12px 9px 34px;font-size:14px;color:#111827;font-family:Nunito,sans-serif">
        </div>
        <button onclick="openSheet('usuarioNuevo')" class="btn btn-primary tap">+ Nuevo</button>
      </div>
      <div style="position:relative">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#9CA3AF">🪪</span>
        <input value="${esc(STATE.searchDni)}" oninput="setState({searchDni:this.value})" placeholder="Buscar por DNI…"
          style="width:100%;background:#fff;border:1.5px solid ${STATE.searchDni?'#2563EB':'#E4E8F0'};border-radius:10px;padding:9px 12px 9px 34px;font-size:14px;color:#111827;font-family:Nunito,sans-serif">
      </div>
      ${(STATE.searchNombre||STATE.searchDni)?`<button onclick="setState({searchNombre:'',searchDni:''})" style="align-self:flex-start;background:none;border:none;font-size:12px;color:#6B7280;cursor:pointer;font-family:Nunito,sans-serif">✕ Limpiar búsqueda</button>`:""}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${filtered.length===0?SCard('<p style="color:#9CA3AF;text-align:center;font-size:13px">Sin resultados</p>'):
        filtered.map(u=>{

          style="width:100%;background:#fff;border:1.5px solid ${STATE.searchInt?'#2563EB':'#E4E8F0'};border-radius:10px;padding:9px 12px 9px 34px;font-size:14px;color:#111827;font-family:Nunito,sans-serif">

        filtered.map(i=>{
          const u = STATE.usuarios.find(u=>u.id===i.usuarioId);

            </div>`, "", `openDetalle('intervencion','${i.id}')`);
        }).join("")}
    </div>
    ${STATE.sheet ? buildSheetIntervencion() : ""}`;
}

      </div>
      <div style="display:flex;gap:10px">
        <button onclick="openSheet('intervencionEdit','${i.id}')" class="btn btn-primary tap" style="flex:1;justify-content:center">✏️ Editar</button>

function buildSheetIntervencion(){
  const f = STATE.form;
  const selU = STATE.usuarios.find(u=>u.id===Number(f.usuarioId));
  const busqModo = f._busqModo || "nombre";
  const busqQ = f._busqQ || "";

    busqModo==="nombre"?u.nombre.toLowerCase().includes(busqQ.toLowerCase()):(u.dni||"").includes(busqQ)
  ).slice(0,6) : [];

  return Sheet(f.id?"Editar intervención":"Nueva intervención", `
    ${Field("Título *","f_titulo","text",f.titulo||"","",true)}
    <div class="field">
      <label>Usuario *</label>
      ${selU?`<div style="display:flex;align-items:center;gap:10px;background:#EFF4FF;border:1.5px solid #2563EB;border-radius:10px;padding:9px 14px">
        ${Avatar(selU.nombre,32,"#2563EB")}
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px">${esc(selU.nombre)}</div>
          <div style="font-size:11px;color:#2563EB">DNI: ${esc(selU.dni||"—")}</div>
        </div>
        <button onclick="setState({form:{...STATE.form,usuarioId:'',_busqQ:''}})" style="background:none;border:none;color:#6B7280;font-size:18px;cursor:pointer">×</button>

          <button onclick="setState({form:{...STATE.form,_busqModo:'dni'}})" class="tap" style="flex:1;padding:7px;border-radius:8px;border:1.5px solid ${busqModo==='dni'?'#2563EB':'#E4E8F0'};background:${busqModo==='dni'?'#EFF4FF':'#fff'};color:${busqModo==='dni'?'#2563EB':'#6B7280'};font-weight:700;font-size:12px;cursor:pointer;font-family:Nunito,sans-serif">🪪 Por DNI</button>

            ${busqRes.map(u=>`<button onclick="setState({form:{...STATE.form,usuarioId:${u.id},_busqQ:''}})" class="tap" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:transparent;border:none;border-bottom:1px solid #E4E8F0;text-align:left;cursor:pointer;font-family:Nunito,sans-serif">

    ${SUBCATS[f.categoria]?Field("Subcategoría","f_subCategoria","text",f.subCategoria||"",SUBCATS[f.categoria]):""}

function buildAtenciones(){
  const porFecha = STATE.atenciones.filter(a=>a.fecha===STATE.fechaAten).sort((a,b)=>a.id-b.id);
  const totalMin = porFecha.reduce((s,a)=>s+(Number(a.duracion)||0),0);
  return `
    <div class="scard" style="padding:12px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="shiftDay(-1)" class="tap" style="background:#F4F6FA;border:1px solid #E4E8F0;border-radius:8px;width:36px;height:36px;font-size:20px;color:#6B7280;display:flex;align-items:center;justify-content:center;cursor:pointer">‹</button>
        <input type="date" value="${STATE.fechaAten}" onchange="setState({fechaAten:this.value})"
          style="flex:1;background:transparent;border:none;font-size:14px;font-weight:700;color:#111827;text-align:center;font-family:Nunito,sans-serif">
        <button onclick="shiftDay(1)" class="tap" style="background:#F4F6FA;border:1px solid #E4E8F0;border-radius:8px;width:36px;height:36px;font-size:20px;color:#6B7280;display:flex;align-items:center;justify-content:center;cursor:pointer">›</button>
      </div>
    </div>
    <div class="grid2" style="margin-bottom:14px">
      ${SCard(`<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#2563EB">${porFecha.length}</div><div style="font-size:11px;color:#6B7280;font-weight:600">Atenciones</div></div>`,"padding:12px")}

        ${Avatar(s.nombre,26,s.usuarioId?"#2563EB":"#9CA3AF")}
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700">${esc(s.nombre)}</div>
          ${s.dni?`<div style="font-size:11px;color:#6B7280">DNI: ${esc(s.dni)}${s.usuarioId?` <span style="color:#2563EB">✓</span>`:""}</div>`:""}
        </div>
        <button onclick="removeSituacion(${i})" style="background:none;border:none;color:#DC2626;font-size:16px;cursor:pointer">×</button>
      </div>`).join("")}
      <input id="inp_sitNombre" value="${esc(STATE.sitNombre)}" oninput="STATE.sitNombre=this.value" placeholder="Nombre de la persona"
        style="width:100%;background:#fff;border:1.5px solid #E4E8F0;border-radius:10px;color:#111827;padding:10px 12px;font-size:14px;margin-bottom:6px;font-family:Nunito,sans-serif">
      <div style="display:flex;gap:8px">
        <input id="inp_sitDni" value="${esc(STATE.sitDni)}" oninput="STATE.sitDni=this.value" placeholder="DNI (opcional, para vincular al legajo)"
          style="flex:1;background:#fff;border:1.5px solid #E4E8F0;border-radius:10px;color:#111827;padding:10px 12px;font-size:14px;font-family:Nunito,sans-serif">
        <button onclick="addSituacion()" class="tap" style="background:#7C3AED;color:#fff;border:none;border-radius:10px;padding:0 14px;font-size:20px;font-weight:700;height:42px;flex-shrink:0;cursor:pointer">+</button>
      </div>
      <div style="font-size:11px;color:#9CA3AF;margin-top:6px">Si el DNI coincide con un usuario registrado se vincula automáticamente al legajo.</div>

    ${Field("Temas tratados","f_temas","textarea",f.temas||"")}
    ${Field("Acuerdos y compromisos","f_acuerdos","textarea",f.acuerdos||"")}
    ${Field("Observaciones","f_observaciones","textarea",f.observaciones||"")}
    <div style="display:flex;gap:10px;padding-top:4px">
      <button onclick="closeSheet()" class="btn btn-ghost tap" style="flex:1;justify-content:center">Cancelar</button>
      <button onclick="guardarReunion()" class="btn btn-primary tap" style="flex:2;justify-content:center">Guardar</button>
    </div>`);
}

// ═══════════════════════════════════════════════════════
// LEGAJO
// ═══════════════════════════════════════════════════════
function buildLegajo(){
  const {legajoModo:modo, legajoQuery:query, legajoSel:selId} = STATE;
  const sel = selId ? STATE.usuarios.find(u=>u.id==selId) : null;
  const resultados = query.trim() ? STATE.usuarios.filter(u=>
    modo==="nombre"?u.nombre.toLowerCase().includes(query.toLowerCase()):(u.dni||"").includes(query)
  ).slice(0,8) : [];

  return `
    ${SCard(`<div style="color:#fff">
      <div style="font-size:11px;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Legajo completo</div>
      <div style="font-size:15px;font-weight:800;line-height:1.4">Buscá por nombre o DNI y descargá toda la información del usuario</div>
    </div>`,"background:linear-gradient(135deg,#6D28D9,#7C3AED);border:none;margin-bottom:14px")}
    <div style="display:flex;gap:8px;margin-bottom:12px">
      ${["nombre","dni"].map(m=>`<button onclick="setState({legajoModo:'${m}',legajoQuery:'',legajoSel:null})" class="tap"
        style="flex:1;padding:9px;border-radius:10px;border:2px solid ${modo===m?'#7C3AED':'#E4E8F0'};background:${modo===m?'#F5F3FF':'#fff'};color:${modo===m?'#7C3AED':'#6B7280'};font-weight:700;font-size:13px;cursor:pointer;font-family:Nunito,sans-serif">
        ${m==="nombre"?"👤 Por nombre":"🪪 Por DNI"}
      </button>`).join("")}
    </div>
    ${!sel?`
      <div style="position:relative;margin-bottom:12px">
        <input value="${esc(query)}" oninput="setState({legajoQuery:this.value})" autofocus
          placeholder="${modo==="nombre"?"Escribir nombre…":"Escribir DNI…"}"
          style="width:100%;background:#fff;border:1.5px solid ${query?'#7C3AED':'#E4E8F0'};border-radius:10px;padding:11px 14px;font-size:14px;color:#111827;font-family:Nunito,sans-serif">
        ${resultados.length>0?`<div style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #E4E8F0;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:50;overflow:hidden">
          ${resultados.map(u=>{
            const nI=STATE.intervenciones.filter(i=>i.usuarioId===u.id).length;
            const nA=STATE.atenciones.filter(a=>a.usuarioId===u.id).length;
            return `<button onclick="setState({legajoSel:${u.id},legajoQuery:''})" class="tap" style="display:flex;align-items:center;gap:12px;width:100%;padding:12px 16px;background:transparent;border:none;border-bottom:1px solid #E4E8F0;text-align:left;cursor:pointer;font-family:Nunito,sans-serif">
              ${Avatar(u.nombre,40,"#7C3AED")}
              <div style="flex:1;min-width:0">
                <div style="font-weight:800;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.nombre)}</div>
                <div style="font-size:12px;color:#6B7280;margin-top:2px;display:flex;gap:10px">
                  <span>🪪 ${esc(u.dni||"Sin DNI")}</span><span>📋 ${nI}</span><span>📅 ${nA}</span>
                </div>
              </div>
              <span style="color:#9CA3AF;font-size:18px">›</span>
            </button>`;
          }).join("")}
        </div>`:""}
        ${query.trim()&&!resultados.length?`<div style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #E4E8F0;border-radius:12px;padding:14px;font-size:13px;color:#9CA3AF;z-index:50">Sin resultados para "${esc(query)}"</div>`:""}
      </div>`:""}
    ${sel?`
      ${SCard(`
        <div style="display:flex;align-items:center;gap:12px">
          ${Avatar(sel.nombre,48,"#7C3AED")}
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:16px">${esc(sel.nombre)}</div>
            <div style="font-size:12px;color:#6B7280;margin-top:2px;display:flex;gap:12px;flex-wrap:wrap">
              <span>🪪 ${esc(sel.dni||"Sin DNI")}</span>
              ${sel.fechaNac?`<span>📅 ${fmtDate(sel.fechaNac)}</span>`:""}
            </div>
          </div>
          <button onclick="setState({legajoSel:null})" style="background:none;border:none;color:#6B7280;font-size:20px;cursor:pointer">×</button>
        </div>
      `,"border-left:4px solid #7C3AED;margin-bottom:12px")}
      ${(()=>{
        const ints  = STATE.intervenciones.filter(i=>i.usuarioId===sel.id);
        const ates  = STATE.atenciones.filter(a=>a.usuarioId===sel.id);
        const reuns = STATE.reuniones.filter(r=>(r.situaciones||[]).some(s=>s.usuarioId===sel.id||(s.dni&&sel.dni&&s.dni===sel.dni)));
        return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
          ${[{icon:"📋",val:ints.length,label:"Interv."},{icon:"📅",val:ates.length,label:"Atenciones"},{icon:"🏛",val:reuns.length,label:"Reuniones"}].map(x=>
            SCard(`<div style="text-align:center"><div style="font-size:20px">${x.icon}</div><div style="font-size:22px;font-weight:800;color:#7C3AED;margin-top:2px">${x.val}</div><div style="font-size:10px;color:#6B7280;font-weight:600">${x.label}</div></div>`,"padding:10px 6px")).join("")}
        </div>`;
      })()}
      <button onclick="imprimirLegajo(${sel.id})" class="btn btn-green btn-full tap" style="font-size:14px">📄 Descargar legajo completo</button>`:""}
    ${!sel&&!query?SCard(`<div style="text-align:center;padding:20px 0;color:#9CA3AF">
      <div style="font-size:40px;margin-bottom:10px">📂</div>
      <div style="font-size:13px;font-weight:700;color:#6B7280">Buscá un usuario para ver su legajo</div>
      <div style="font-size:12px;margin-top:4px">Por nombre o por DNI</div>
    </div>`):""}`;
}

// ═══════════════════════════════════════════════════════
// MAPA
// ═══════════════════════════════════════════════════════
function buildMapa(){
  const puntos = STATE.usuarios.filter(u=>{
    if(!u.direccion) return false;
    if(!STATE.mapaCat) return STATE.intervenciones.some(i=>i.usuarioId===u.id);
    return STATE.intervenciones.some(i=>i.usuarioId===u.id&&i.categoria===STATE.mapaCat);
  }).map(u=>{
    const cats = [...new Set(STATE.intervenciones.filter(i=>i.usuarioId===u.id&&(!STATE.mapaCat||i.categoria===STATE.mapaCat)).map(i=>i.categoria))];
    return {...u,cats};
  });
  const totalConDir = STATE.usuarios.filter(u=>u.direccion&&STATE.intervenciones.some(i=>i.usuarioId===u.id)).length;

  return `
    ${SCard(`<div style="color:#fff">
      <div style="font-size:11px;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Análisis territorial</div>
      <div style="font-size:16px;font-weight:800;margin-bottom:4px">Murphy, Santa Fe, CP 2601</div>
      <div style="font-size:13px;opacity:.9">${totalConDir} usuario${totalConDir!==1?"s":""} con dirección registrada</div>
    </div>`,"background:linear-gradient(135deg,#064e3b,#059669);border:none;margin-bottom:16px")}
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:8px">Filtrar por categoría</div>
      <div class="hscroll">
        <button onclick="setState({mapaCat:''})" class="pill ${!STATE.mapaCat?'active':'inactive'} tap">Todas</button>
        ${CATS.map(c=>`<button onclick="setState({mapaCat:STATE.mapaCat==='${c}'?'':'${c}'})" class="tap"
          style="border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:Nunito,sans-serif;background:${STATE.mapaCat===c?catColor(c):'#F1F5F9'};color:${STATE.mapaCat===c?'#fff':'#6B7280'}">
          ${c}
        </button>`).join("")}
      </div>
    </div>
    <button onclick="abrirMapa()" class="btn btn-green btn-full tap" style="font-size:14px;margin-bottom:14px">🗺 Abrir mapa territorial</button>
    <div>
      <div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Usuarios en el mapa (${puntos.length})</div>
      ${puntos.length===0?SCard(`<p style="color:#9CA3AF;text-align:center;font-size:13px;padding:8px 0">${totalConDir===0?"Registrá direcciones en los usuarios para usar el mapa":"Sin resultados para este filtro"}</p>`):""}
      ${puntos.map(p=>SCard(`
        <div style="display:flex;gap:10px;align-items:flex-start">
          ${Avatar(p.nombre,38,STATE.mapaCat?catColor(STATE.mapaCat):"#2563EB")}
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:14px;margin-bottom:3px">${esc(p.nombre)}</div>
            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.direccion+", Murphy, Santa Fe, CP 2601")}" target="_blank"
              style="font-size:12px;color:#2563EB;text-decoration:none;display:block;margin-bottom:5px">📍 ${esc(p.direccion)} ›</a>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${p.cats.map(c=>`<span style="background:${catColor(c)}22;color:${catColor(c)};border-radius:12px;padding:1px 8px;font-size:11px;font-weight:700">${c}</span>`).join("")}
            </div>
          </div>
        </div>`,"margin-bottom:8px")).join("")}
    </div>`;
}

// ═══════════════════════════════════════════════════════
// CALENDARIO
// ═══════════════════════════════════════════════════════
function buildCalendario(){
  const {calYear:year,calMonth:month,calVista:vista,calDia:diaSelec} = STATE;
  const primerDia = new Date(year,month,1).getDay();
  const totalDias = new Date(year,month+1,0).getDate();
  const todayStr = hoy();

  const getEvsDia = (d) => {
    if(!d) return [];
    const fecha = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return STATE.eventos.filter(e=>e.fecha===fecha).sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));
  };

  const proximos = [...STATE.eventos].filter(e=>e.fecha>=todayStr).sort((a,b)=>a.fecha.localeCompare(b.fecha)||(a.hora||"").localeCompare(b.hora||"")).slice(0,15);

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:12px;color:#6B7280;font-weight:600">${STATE.eventos.length} evento${STATE.eventos.length!==1?"s":""}</div>
      <button onclick="openSheet('eventoNuevo')" class="btn btn-primary tap" style="padding:8px 14px;font-size:12px">+ Evento</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button onclick="setState({calVista:'mes'})" class="tap" style="flex:1;padding:7px;border-radius:10px;border:1.5px solid ${vista==='mes'?'#2563EB':'#E4E8F0'};background:${vista==='mes'?'#EFF4FF':'transparent'};color:${vista==='mes'?'#2563EB':'#6B7280'};font-weight:700;font-size:12px;cursor:pointer;font-family:Nunito,sans-serif">📅 Mes</button>
      <button onclick="setState({calVista:'agenda'})" class="tap" style="flex:1;padding:7px;border-radius:10px;border:1.5px solid ${vista==='agenda'?'#2563EB':'#E4E8F0'};background:${vista==='agenda'?'#EFF4FF':'transparent'};color:${vista==='agenda'?'#2563EB':'#6B7280'};font-weight:700;font-size:12px;cursor:pointer;font-family:Nunito,sans-serif">📋 Agenda</button>
    </div>
    ${vista==="mes"?`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <button onclick="navMes(-1)" class="tap" style="background:#fff;border:1px solid #E4E8F0;border-radius:10px;width:38px;height:38px;font-size:18px;color:#6B7280;display:flex;align-items:center;justify-content:center;cursor:pointer">‹</button>
        <div style="flex:1;text-align:center">
          <div style="font-size:18px;font-weight:800">${MESES[month]}</div>
          <div style="font-size:12px;color:#6B7280">${year}</div>
        </div>
        <button onclick="navMes(1)" class="tap" style="background:#fff;border:1px solid #E4E8F0;border-radius:10px;width:38px;height:38px;font-size:18px;color:#6B7280;display:flex;align-items:center;justify-content:center;cursor:pointer">›</button>
      </div>
      ${SCard(`
        <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">
          ${DIAS_CORTO.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#9CA3AF;padding:2px 0">${d}</div>`).join("")}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
          ${Array(primerDia).fill(null).map((_,i)=>`<div key="e${i}"></div>`).join("")}
          ${Array.from({length:totalDias},(_,i)=>i+1).map(d=>{
            const fecha=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const evs=getEvsDia(d);
            const isToday=fecha===todayStr;
            const isSel=diaSelec===d;
            return `<button onclick="setState({calDia:${isSel?'null':d}})" class="tap"
              style="background:${isSel?'#2563EB':isToday?'#EFF4FF':'transparent'};border-radius:10px;padding:6px 2px;border:1.5px solid ${isSel?'#2563EB':isToday?'rgba(37,99,235,.4)':'transparent'};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:44px">
              <span style="font-size:13px;font-weight:${isToday||isSel?800:500};color:${isSel?'#fff':isToday?'#2563EB':'#111827'}">${d}</span>
              <div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">
                ${evs.slice(0,3).map(e=>`<div style="width:6px;height:6px;border-radius:50%;background:${isSel?'rgba(255,255,255,.8)':tipoColor(e.tipo)}"></div>`).join("")}
                ${evs.length>3?`<span style="font-size:8px;color:${isSel?'rgba(255,255,255,.8)':'#9CA3AF'};font-weight:700">+${evs.length-3}</span>`:""}
              </div>
            </button>`;
          }).join("")}
        </div>`,"padding:12px 10px")}
      ${diaSelec?(()=>{
        const evs=getEvsDia(diaSelec);
        const fechaLabel=fmtDate(`${year}-${String(month+1).padStart(2,"0")}-${String(diaSelec).padStart(2,"0")}`);
        return `<div style="margin-top:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-weight:800;font-size:14px">${fechaLabel}</div>
            <button onclick="openSheet('eventoNuevoDia')" class="btn btn-primary tap" style="padding:6px 12px;font-size:12px">+ Agregar</button>
          </div>
          ${evs.length===0?SCard('<p style="color:#9CA3AF;text-align:center;font-size:13px;padding:8px 0">Sin eventos este día</p>'):""}
          ${evs.map(e=>SCard(`
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:22px;flex-shrink:0">${tipoIcon(e.tipo)}</span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:800;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.titulo)}</div>
                <div style="font-size:12px;color:#6B7280;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
                  ${e.hora?`<span>🕐 ${e.hora}${e.horaFin?" – "+e.horaFin:""}</span>`:""}
                  <span style="color:${tipoColor(e.tipo)};font-weight:600">${e.tipo}</span>
                  ${e.profesional?`<span>👤 ${esc(e.profesional)}</span>`:""}
                </div>
              </div>
              <div style="display:flex;gap:4px">
                <button onclick="openSheet('eventoEdit','${e.id}')" style="background:none;border:none;font-size:16px;cursor:pointer">✏️</button>
                <button onclick="eliminarEvento('${e.id}')" style="background:none;border:none;font-size:16px;cursor:pointer">🗑</button>
              </div>
            </div>`,"margin-bottom:8px;border-left:4px solid "+tipoColor(e.tipo))).join("")}
        </div>`;
      })():""}
    `:`
      <div style="font-size:13px;color:#6B7280;font-weight:600;margin-bottom:10px">Próximos ${proximos.length} eventos</div>
      ${proximos.length===0?SCard(`<div style="text-align:center;padding:20px 0;color:#9CA3AF"><div style="font-size:36px;margin-bottom:8px">🗓</div><div style="font-size:13px;font-weight:700;color:#6B7280">Sin eventos próximos</div></div>`):""}
      ${proximos.map((e,idx,arr)=>{
        const prevFecha=idx>0?arr[idx-1].fecha:null;
        const mostrar=e.fecha!==prevFecha;
        return `${mostrar?`<div style="font-size:12px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:1px;padding:8px 4px 4px;display:flex;align-items:center;gap:6px">
          <div style="width:6px;height:6px;border-radius:50%;background:${e.fecha===todayStr?'#2563EB':'#9CA3AF'}"></div>
          ${e.fecha===todayStr?"Hoy":fmtDate(e.fecha)}
        </div>`:""}
        ${SCard(`<div style="display:flex;gap:10px;align-items:center">
          <span style="font-size:22px;flex-shrink:0">${tipoIcon(e.tipo)}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.titulo)}</div>
            <div style="font-size:12px;color:#6B7280;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
              ${e.hora?`<span>🕐 ${e.hora}${e.horaFin?" – "+e.horaFin:""}</span>`:""}
              <span style="color:${tipoColor(e.tipo)};font-weight:600">${e.tipo}</span>
              ${e.lugar?`<span>📍 ${esc(e.lugar)}</span>`:""}
            </div>
          </div>
          <div style="display:flex;gap:4px">
            <button onclick="openSheet('eventoEdit','${e.id}')" style="background:none;border:none;font-size:16px;cursor:pointer">✏️</button>
            <button onclick="eliminarEvento('${e.id}')" style="background:none;border:none;font-size:16px;cursor:pointer">🗑</button>
          </div>
        </div>`,"margin-bottom:4px;border-left:4px solid "+tipoColor(e.tipo))}`;
      }).join("")}
    `}
    ${STATE.sheet ? buildSheetEvento() : ""}`;
}

function buildSheetEvento(){
  const f = STATE.form;
  const TIPOS_EV = ["Reunión","Visita","Trámite","Capacitación","Recordatorio","Otro"];
  const PROFS_EV = [...PROFS,"Todo el equipo"];
  return Sheet(f.id?"Editar evento":"Nuevo evento", `
    ${Field("Título *","f_titulo","text",f.titulo||"","",true)}
    <div class="field">
      <label>Tipo</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        ${TIPOS_EVENTO.map(t=>`<button onclick="setState({form:{...STATE.form,tipo:'${t.label}'}})" class="tap"

function buildApp(){
  const contentPad = STATE.tab==="inicio" ? "14px 14px 20px" : "14px 14px 86px";
  let content = "";
  switch(STATE.tab){
    case "inicio":         content = buildInicio(); break;
    case "usuarios":       content = buildUsuarios(); break;
    case "intervenciones": content = buildIntervenciones(); break;
    case "atenciones":     content = buildAtenciones(); break;
    case "seguimiento":    content = buildSeguimiento(); break;
    case "institucional":  content = buildInstitucional(); break;
    case "legajo":         content = buildLegajo(); break;
    case "mapa":           content = buildMapa(); break;
    case "calendario":     content = buildCalendario(); break;
  }
  return `
    ${buildTopbar()}
    <div class="content" style="padding:${contentPad};overflow-y:auto;flex:1">${content}</div>
    ${buildBottomNav()}`;
}

function openSheet(tipo, id){
  let form = {};
  if(tipo==="usuarioNuevo")      form = {nombre:"",dni:"",telefono:"",email:"",direccion:"",fechaNac:"",fechaAlta:hoy(),cud:"No",cudFoto:"",notas:""};
  if(tipo==="usuarioEdit")       { const u=STATE.usuarios.find(u=>u.id==id); form={...u}; }
  if(tipo==="intervencionNueva") form = {titulo:"",usuarioId:"",categoria:"",subCategoria:"",fechaInicio:hoy(),profesional:"",descripcion:"",_busqModo:"nombre",_busqQ:""};
  if(tipo==="intervencionEdit")  { const i=STATE.intervenciones.find(i=>i.id==id); form={...i,_busqModo:"nombre",_busqQ:""}; }
  if(tipo==="atencionNueva")     form = {intervencionId:"",usuarioId:"",fecha:STATE.fechaAten,tipo:"Presencial",profesional:"",duracion:30,descripcion:"",accionesSiguientes:""};
  if(tipo==="atencionEdit")      { const a=STATE.atenciones.find(a=>a.id==id); form={...a}; }
  if(tipo==="reunionNueva")      form = {titulo:"",tipo:"Reunión de equipo",fecha:hoy(),lugar:"",participantes:[],situaciones:[],temas:"",acuerdos:"",observaciones:""};
  if(tipo==="reunionEdit")       { const r=STATE.reuniones.find(r=>r.id==id); form={...r,participantes:[...(r.participantes||[])],situaciones:[...(r.situaciones||[])]}; }
  if(tipo==="eventoNuevo")       form = {titulo:"",fecha:hoy(),hora:"",horaFin:"",tipo:"Reunión",lugar:"",profesional:"Todo el equipo",descripcion:""};
  if(tipo==="eventoNuevoDia")    { const fecha=`${STATE.calYear}-${String(STATE.calMonth+1).padStart(2,"0")}-${String(STATE.calDia).padStart(2,"0")}`; form={titulo:"",fecha,hora:"",horaFin:"",tipo:"Reunión",lugar:"",profesional:"Todo el equipo",descripcion:""}; }
  if(tipo==="eventoEdit")        { const e=STATE.eventos.find(e=>e.id==id); form={...e}; }
  setState({sheet:tipo,form});
}

function openDetalle(tipo,id){
  setState({detail:id,sheet:null});
}

function getFormValues(){
  const inputs = document.querySelectorAll('[id^="f_"]');
  const vals = {};
  inputs.forEach(el=>{ vals[el.id.replace("f_","")] = el.value; });
  return vals;
}

function guardarUsuario(){
  const v = getFormValues();
  if(!v.nombre?.trim()) return alert("El nombre es obligatorio");
  const f = {...STATE.form,...v};
  if(f.id){
    STATE.usuarios = STATE.usuarios.map(u=>u.id==f.id?f:u);
    setState({usuarios:STATE.usuarios,sheet:null,detail:f.id});
  } else {
    f.id = newId(STATE.usuarios);
    STATE.usuarios = [...STATE.usuarios,f];
    setState({usuarios:STATE.usuarios,sheet:null});
  }
}

function eliminarUsuario(id){
  if(!confirm("¿Eliminar usuario?")) return;
  syncSheet("usuarios","delete",null,id);
  setState({usuarios:STATE.usuarios.filter(u=>u.id!=id),detail:null});
}

function guardarIntervencion(){

function navMes(d){

  setState({calMonth:m,calYear:y,calDia:null});

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzCiOJMZCjkF1o77ArzCLPiZX-0o50uwWjJGjMVdy-H9Pps766mOkrYgti_7hbwl1UC/exec";

async function cargarDatos(){
  // Cargar desde localStorage primero (instantáneo)
  try{
    const cache = localStorage.getItem("accion_social_cache");
    if(cache){
      const d = JSON.parse(cache);
      STATE.usuarios       = d.usuarios||[];
      STATE.intervenciones = d.intervenciones||[];
      STATE.atenciones     = d.atenciones||[];
      STATE.reuniones      = d.reuniones||[];
      STATE.eventos        = d.eventos||[];
      STATE.informes       = d.informes||[];
    }
  }catch(e){}
  // Mostrar app inmediatamente con lo que hay
  render();
  // Luego sincronizar en segundo plano
  showLoading(true);

  // Actualizar desde Sheets en segundo plano
  try{
    const res = await fetch(SHEETS_URL+"?tab=all");
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    STATE.usuarios       = (data.usuarios||[]).map(normalizar);
    STATE.intervenciones = (data.intervenciones||[]).map(normalizar);
    STATE.atenciones     = (data.atenciones||[]).map(normalizar);
    STATE.reuniones      = (data.reuniones||[]).map(r=>({...normalizar(r),participantes:parseLista(r.participantes),situaciones:parseLista(r.situaciones)}));
    STATE.eventos        = (data.eventos||[]).map(normalizar);
    STATE.informes       = (data.informes||[]).map(normalizar);
    // Guardar en cache local
    try{
      localStorage.setItem("accion_social_cache", JSON.stringify({
        usuarios:STATE.usuarios, intervenciones:STATE.intervenciones,
        atenciones:STATE.atenciones, reuniones:STATE.reuniones,
        eventos:STATE.eventos, informes:STATE.informes
      }));
    }catch(e){}
    showLoading(false);
    render();
  }catch(e){
    showLoading(false);
    console.error("Error cargando desde Sheets:",e);
    render();
  }
}

function normalizar(obj){
  const r={};
  for(const k in obj){
    const v=obj[k];
    if(k==="id"||k==="usuarioId"||k==="intervencionId"||k==="duracion") r[k]=Number(v)||0;
    else r[k]=v===undefined||v===null?"":String(v);
  }
  return r;
}

function parseLista(val){
  if(!val||val==="") return [];
  try{return JSON.parse(val);}catch{return [];}
}

async function syncSheet(tab,action,data,id){
  try{
    const d=data?{...data}:null;
    if(d&&d.participantes) d.participantes=JSON.stringify(d.participantes||[]);
    if(d&&d.situaciones)   d.situaciones=JSON.stringify(d.situaciones||[]);
    if(d&&d.convivientes&&typeof d.convivientes!=="string") d.convivientes=JSON.stringify(d.convivientes||[]);
    await fetch(SHEETS_URL,{method:"POST",body:JSON.stringify({tab,action,data:d,id})});
  }catch(e){console.error("Sync error:",e);}
}

function showLoading(show){
  const el=document.getElementById("loading-overlay");
  if(el) el.style.display=show?"flex":"none";
}

function addConviviente(){
  const nombre=(document.getElementById("conv_nombre")||{}).value||"";
  const dni=(document.getElementById("conv_dni")||{}).value||"";
  const fechaNac=(document.getElementById("conv_fechaNac")||{}).value||"";
  const ocupacion=(document.getElementById("conv_ocupacion")||{}).value||"";
  const ingresos=(document.getElementById("conv_ingresos")||{}).value||"";
  if(!nombre.trim()) return alert("Ingresá al menos el nombre del conviviente");
  const conv=typeof STATE.form.convivientes==="string"?JSON.parse(STATE.form.convivientes||"[]"):(STATE.form.convivientes||[]);
  conv.push({nombre,dni,fechaNac,ocupacion,ingresos});
  setState({form:{...STATE.form,convivientes:conv}});
}

function removeConviviente(idx){
  const conv=typeof STATE.form.convivientes==="string"?JSON.parse(STATE.form.convivientes||"[]"):(STATE.form.convivientes||[]);
  conv.splice(idx,1);
  setState({form:{...STATE.form,convivientes:conv}});
}

function guardarInforme(){
  const v=getFormValues();
  if(!v.nombre?.trim()) return alert("El nombre es obligatorio");
  const f={...STATE.form,...v};
  if(typeof f.convivientes!=="string") f.convivientes=JSON.stringify(f.convivientes||[]);
  if(f.id){
    STATE.informes=(STATE.informes||[]).map(i=>i.id==f.id?f:i);
    syncSheet("informes","update",f);
    setState({informes:STATE.informes,sheet:null,detail:f.id});
  } else {
    f.id=newId(STATE.informes||[]);
    STATE.informes=[...(STATE.informes||[]),f];
    syncSheet("informes","insert",f);
    setState({informes:STATE.informes,sheet:null});
  }
}

function eliminarInforme(id){
  if(!confirm("¿Eliminar informe?")) return;
  syncSheet("informes","delete",null,id);
  setState({informes:(STATE.informes||[]).filter(i=>i.id!=id),detail:null});
}

if("serviceWorker" in navigator){
  const swCode = `
    const CACHE = "accion-social-v1";
    self.addEventListener("install", e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(["."]))));
    self.addEventListener("fetch", e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const swBlob = new Blob([swCode],{type:"application/javascript"});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
